# ESTRUTURA IAC - KUBERNETES HELM CHART (API GATEWAY)
# Projeto Aura - Instituto Ser Melhor
# Local: /infra/helm/aura-api/values.yaml

replicaCount: 2

image:
  repository: 123456789.dkr.ecr.sa-east-1.amazonaws.com/aura-api
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m" # Para uploads de exames e laudos
  hosts:
    - host: api.institutosermelhor.org.br
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: aura-api-tls
      hosts:
        - api.institutosermelhor.org.br

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

env:
  NODE_ENV: production
  DB_HOST: aura-prod-db.cluster-ro-xyz.sa-east-1.rds.amazonaws.com
  # Senhas e chaves são injetadas via External Secrets Operator / AWS Parameter Store, 
  # NUNCA declaradas diretamente no Helm Chart.
